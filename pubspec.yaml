name: medical_appointment_system
description: A comprehensive medical appointment booking system supporting multiple languages and platforms
version: 1.0.0+1
# Release Version 1.0.0 for Formal QA

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  
  # UI Components
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  
  # Internationalization
  intl: ^0.20.2
  flutter_gen: ^5.3.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.2
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Authentication & Security
  crypto: ^3.0.3
  # local_auth: ^2.1.6
  encrypt: ^5.0.1
  
  # Calendar & Date/Time
  table_calendar: ^3.0.9
  timezone: ^0.9.2
  
  # Payment Processing
  # flutter_stripe: ^10.1.1
  
  # Notifications
  # flutter_local_notifications: ^16.3.0
  # firebase_messaging: ^14.7.10
  
  # File Handling
  file_picker: ^8.3.7
  # image_picker: ^1.0.4
  flutter_markdown: ^0.7.1
  
  # Utilities
  uuid: ^4.2.1
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.2
  
  # Charts & Analytics
  fl_chart: ^0.65.0
  
  # Video Calling (for telehealth)
  agora_rtc_engine: ^6.2.6

  # Print to system printer (Windows / desktop)
  printing: ^5.13.3
  pdf: ^3.11.1

  # Shared packages (upstream); see packages/README.md
  medical_shared:
    path: packages/medical_shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: 10.2.1

  # Testing
  integration_test:
    sdk: flutter
  mockito: ^5.4.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  # Use simple main file for now
  # entry-point: lib/main_simple.dart
  

<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>הרשמה לאפליקציה</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f5f7fb; }
      .card { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
      .title { margin: 0 0 8px; }
      .muted { color: #6b7280; }
      label { display: block; font-weight: 600; margin-top: 12px; }
      input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; margin-top: 8px; }
      button { margin-top: 20px; width: 100%; background: #2563eb; color: #fff; border: 0; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
      .ok { color: #059669; }
      .err { color: #dc2626; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 class="title">הרשמה לאפליקציית התורים</h2>
      <p class="muted">קיבלת הזמנה מרופא. מלא פרטים להשלמת הרשמה.</p>
      <div id="status" class="muted">טוען הזמנה...</div>
      <form id="form" style="display:none">
        <label>שם מלא<input id="name" type="text" required /></label>
        <label>אימייל<input id="email" type="email" required /></label>
        <label>טלפון (רשות)<input id="phone" type="tel" /></label>
        <label>סיסמה<input id="password" type="password" required /></label>
        <button type="submit">השלמת הרשמה</button>
      </form>
      <div id="done" style="display:none" class="ok">נרשמת בהצלחה! אפשר להתחבר באפליקציה.</div>
      <div id="error" style="display:none" class="err"></div>
    </div>
    <script>
      const qs = new URLSearchParams(location.search);
      const token = qs.get('token');
      const api = (path, opts={}) => fetch(`/api/v1/invitations${path}`, { headers: { 'Content-Type':'application/json' }, ...opts });

      async function init() {
        const status = document.getElementById('status');
        const form = document.getElementById('form');
        const err = document.getElementById('error');
        if (!token) { status.textContent = 'אסימון הזמנה חסר'; return; }
        try {
          const r = await api(`/verify/${token}`);
          const j = await r.json();
          if (!j.success) throw new Error(j.message || 'אסימון לא תקין');
          status.textContent = 'הזמנה אומתה';
          form.style.display = 'block';
          document.getElementById('name').value = j.data.name || '';
          document.getElementById('email').value = j.data.email || '';
        } catch (e) {
          err.style.display = 'block';
          err.textContent = e.message;
        }
      }

      document.getElementById('form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const body = {
          password: document.getElementById('password').value,
          phone: document.getElementById('phone').value,
        };
        const r = await api(`/accept/${token}`, { method: 'POST', body: JSON.stringify(body) });
        const j = await r.json();
        if (!j.success) { const err = document.getElementById('error'); err.style.display='block'; err.textContent=j.message||'שגיאה'; return; }
        document.getElementById('form').style.display = 'none';
        document.getElementById('done').style.display = 'block';
      });

      init();
    </script>
  </body>
</html>

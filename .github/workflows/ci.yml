name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  flutter-analyze-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart is gitignored; CI must regenerate Retrofit / json_serializable output.
      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze lib test integration_test --no-fatal-infos

      - name: Unit & widget tests
        run: flutter test test

      # lib/ is not fully formatted; enforce style on tests only.
      - name: Check Dart format (test + integration_test)
        run: dart format --set-exit-if-changed test integration_test

  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install, lint, test & build backend
        run: |
          cd backend
          npm ci
          npm run lint
          npm test
          npm run build

  build-web:
    needs: [flutter-analyze-test, backend-test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: flutter build web

      - uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web/

  # Windows: integration driver smoke (tests skip without RUN_FULL_E2E) + release build.
  windows-desktop:
    needs: [flutter-analyze-test, backend-test]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # build/ must not be in git: CMakeCache embeds absolute paths and breaks other machines/CI.
      - name: Clean Flutter build
        run: flutter clean

      - name: Windows E2E harness (skipped unless RUN_FULL_E2E=true)
        run: >
          flutter test integration_test/full_automated_test.dart -d windows
          --dart-define=RUN_FULL_E2E=false

      - name: Build Windows
        run: flutter build windows

      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build/windows/

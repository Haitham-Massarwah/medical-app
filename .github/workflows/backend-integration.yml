# Manual-only: integration tests need Postgres + migrations; run from Actions tab when ready.
name: Backend integration tests

on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medical_app_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: medical_app_test_db
      JWT_SECRET: ci-test-jwt-secret
      SKIP_SERVER_START: "true"
      SKIP_DB_CONNECTION_CHECK: "true"
      REDIS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run migrations (knex env = test)
        run: |
          cd backend
          npm run migrate

      - name: Integration tests
        run: |
          cd backend
          npm run test:integration
